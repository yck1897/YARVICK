function YCKOrb({ size=36, state=“idle”, onClick }) {
const isL = state===“listening”, isT = state===“thinking”;
const col = isT ? C.red : isL ? C.orange : C.cyan;
const glow = isT ? “rgba(255,59,48,.45)” : isL ? “rgba(255,159,10,.45)” : “rgba(0,229,255,.3)”;
const spA = isT ? “.45s” : “3s”, spB = isT ? “.65s” : “4.8s”;
const spC = isT ? “.8s” : “6.5s”, spD = isT ? “.35s” : “8.5s”;
const cx = size/2;
const sc = size/80;
const rings = [
{r:.92,da:“3 8”,  sp:spA,dir:“spinA”,w:.8, op:.45},
{r:.85,da:“7 4”,  sp:spB,dir:“spinB”,w:1.5,op:.7},
{r:.77,da:“1 7”,  sp:spC,dir:“spinA”,w:.6, op:.4},
{r:.70,da:“4 5”,  sp:spD,dir:“spinB”,w:1,  op:.6},
{r:.62,da:“10 3”, sp:spA,dir:“spinA”,w:.7, op:.5},
{r:.54,da:“2 5”,  sp:spB,dir:“spinB”,w:1.2,op:.75},
{r:.46,da:“5 2”,  sp:spC,dir:“spinA”,w:.5, op:.4},
{r:.38,da:“2 4”,  sp:spD,dir:“spinB”,w:.8, op:.55},
{r:.90,da:“0 11 3.5 0”,sp:spD,dir:“spinA”,w:2.2,op:.95},
{r:.71,da:“0 7.5 2 0”, sp:spC,dir:“spinB”,w:1.8,op:.88},
{r:.53,da:“0 4.5 1 0”, sp:spB,dir:“spinA”,w:1.5,op:.78},
{r:.35,da:“0 3 .8 0”,  sp:spA,dir:“spinB”,w:1.2,op:.8},
];
const yckPaths = size>=70 ? [
`M${10*sc} ${18*sc} L${20*sc} ${33*sc} L${30*sc} ${18*sc} M${20*sc} ${33*sc} L${20*sc} ${48*sc}`,
`M${46*sc} ${22*sc} A${9*sc} ${9*sc} 0 1 0 ${46*sc} ${44*sc}`,
`M${57*sc} ${18*sc} L${57*sc} ${48*sc} M${57*sc} ${33*sc} L${69*sc} ${18*sc} M${57*sc} ${33*sc} L${69*sc} ${48*sc}`,
] : [];
return (
<div onClick={onClick} style={{width:size,height:size,position:“relative”,cursor:onClick?“pointer”:“default”}}>
<div style={{position:“absolute”,inset:-size*.13,borderRadius:“50%”,background:`radial-gradient(circle, ${glow} 0%, transparent 70%)`,animation:`pulse 2s ease-in-out infinite`}}/>
<svg style={{position:“absolute”,inset:0,overflow:“visible”}} width={size} height={size}>
{rings.map((rg,i)=>(
<circle key={i} cx={cx} cy={cx} r={rg.r*cx} fill=“none” stroke={col} strokeWidth={rg.w} strokeDasharray={rg.da} strokeOpacity={rg.op}
style={{animation:`${rg.dir} ${rg.sp} linear infinite`,transformOrigin:`${cx}px ${cx}px`}}/>
))}
{[0,30,60,90,120,150,180,210,240,270,300,330].map((a,i)=>{
const rad=a*Math.PI/180, r=cx*.91;
return <circle key={i} cx={cx+r*Math.cos(rad)} cy={cx+r*Math.sin(rad)} r={size*.024} fill={col} opacity={.7} style={{animation:`glowP ${1.5+i*.2}s ease-in-out infinite`,animationDelay:`${i*.1}s`}}/>;
})}
{yckPaths.map((d,i)=>(
<path key={i} d={d} fill=“none” stroke={col} strokeWidth=“1.4” strokeLinecap=“round”
strokeOpacity={isT?.6:.18} style={{animation:`glowP ${2+i*.6}s ease-in-out infinite`}}/>
))}
</svg>
<div style={{position:“absolute”,left:cx*.34,top:cx*.34,width:cx*1.32,height:cx*1.32,borderRadius:“50%”,background:`radial-gradient(circle, ${col}20 0%, transparent 70%)`}}/>
{isT&&(
<div style={{position:“absolute”,inset:0,display:“flex”,alignItems:“center”,justifyContent:“center”,gap:size*.04}}>
{[0,1,2,3,4].map(i=><div key={i} style={{width:size*.034,height:size*.2,background:col,borderRadius:2,animation:`thinking .8s ease-in-out infinite`,animationDelay:`${i*.12}s`}}/>)}
</div>
)}
{isL&&<div style={{position:“absolute”,inset:-size*.07,borderRadius:“50%”,border:`2px solid ${C.orange}`,animation:`pulse .8s ease-in-out infinite`}}/>}
</div>
);
}

function useYarvick(role, nome, richieste, setRichieste) {
const [orbState, setOrbState] = useState(“idle”);
const [msgs, setMsgs] = useState([]);
const [showChat, setShowChat] = useState(false);
const [input, setInput] = useState(””);
const staffStr = STAFF.map(s=>`${s.nome}(${s.ruolo},${s.sede},${s.ore}h)`).join(”,”);
const SYS = `Sei YARVICK, assistente AI di Sirio Bar — stile Jarvis. Professionale, diretto, preciso. Rispondi in italiano. SEDI: Parini (Lun-Ven 05:00-21:00, Sab 06:00-18:30, Dom 06:00-16:30) | Beauregard (Lun-Ven 05:00-18:30, Sab-Dom 06:00-14:30) STAFF: ${staffStr} REGOLE: 1)MAI Jessica+Adriana De Luca 2)Carmela SEMPRE con Matteo/Amine a Beauregard 3)Amine contratto scade 30/04/2026 SCADENZE CRITICHE: Contratto Amine scade 30/04 — URGENTE. Coca-Cola Parini in ritardo. Lavazza Beauregard in ritardo. ${role==="manager"?"Parli con YANNICK il responsabile. Puoi dare tutte le info e fare analisi complete.":"Parli con un dipendente. Dai info sui turni, HACCP, procedure. Non rivelare dati privati degli altri."}`;

const send = async (text) => {
if (!text.trim()) return;
if (role===“dipendente” && /riposo|permesso|libero|ferie/i.test(text)) {
setMsgs(p=>[…p,{r:“u”,t:text},{r:“a”,t:`Richiesta inoltrata a Yannick. Riceverai conferma presto.`}]);
setRichieste(p=>[…p,{id:Date.now(),dipNome:nome,tipo:“Richiesta via Yarvick”,data:new Date().toLocaleDateString(“it”),stato:“In attesa”,nota:text}]);
setInput(””); return;
}
const newMsgs=[…msgs,{r:“u”,t:text}];
setMsgs(newMsgs); setInput(””); setOrbState(“thinking”);
try {
const res=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,
headers:{“Content-Type”:“application/json”,“anthropic-version”:“2023-06-01”,“x-api-key”:window.ANTHROPIC_API_KEY||””},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:800,system:SYS,messages:newMsgs.map(m=>({role:m.r===“u”?“user”:“assistant”,content:m.t}))})
});
const d=await res.json();
setMsgs([…newMsgs,{r:“a”,t:d.content?.[0]?.text||“Errore risposta.”}]);
} catch { setMsgs([…newMsgs,{r:“a”,t:“Connessione interrotta. Riprova.”}]); }
setOrbState(“idle”);
};

const startVoice = () => {
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){alert(“Microfono non supportato su questo browser”);return;}
const r=new SR(); r.lang=“it-IT”;
r.onstart=()=>setOrbState(“listening”);
r.onresult=e=>{setInput(e.results[0][0].transcript);setOrbState(“idle”);};
r.onerror=()=>setOrbState(“idle”); r.start();
};
return {orbState,msgs,showChat,setShowChat,input,setInput,send,startVoice};
}

? STAFF.filter(s=>!s.inattivo).sort((a,b)=>a.nome.localeCompare(b.nome))

function DipendenteScansione({ordini, setOrdini}) {
const [fase,setFase]=useState(“idle”);
const [foto,setFoto]=useState([]);
const [loc,setLoc]=useState(null);
const [ordineId,setOrdineId]=useState(””);
const fileRef=useRef(null);
useEffect(()=>{
if(navigator.geolocation)navigator.geolocation.getCurrentPosition(
p=>{
const lat=p.coords.latitude, lng=p.coords.longitude;
const sedeGeo=Math.abs(lat-45.7369)<0.01?“Beauregard”:“Parini”;
setLoc({lat,lng,sede:sedeGeo,ora:new Date().toLocaleTimeString(“it”).slice(0,5)});
},
()=>setLoc({sede:“Non rilevata”,ora:new Date().toLocaleTimeString(“it”).slice(0,5)})
);
},[]);
const handleFile=(e)=>{const urls=Array.from(e.target.files).map(f=>URL.createObjectURL(f));setFoto(p=>[…p,…urls]);};
const invia=()=>{
if(!ordineId)return;
setOrdini(prev=>prev.map(o=>o.id===parseInt(ordineId)?{…o,bolla:true,foto:foto[0]||null,oraBolla:loc?.ora,sedeBolla:loc?.sede}:o));
setFase(“done”);
};
if(fase===“done”)return(
<div style={{…S.page,textAlign:“center”,paddingTop:50}}>
<div style={{width:65,height:65,borderRadius:“50%”,background:“rgba(50,215,75,.1)”,border:`2px solid ${C.green}`,display:“flex”,alignItems:“center”,justifyContent:“center”,margin:“0 auto 16px”,…mono,fontSize:28,color:C.green}}>✓</div>
<div style={{...mono,color:C.green,fontSize:15,letterSpacing:2,marginBottom:9}}>BOLLA CERTIFICATA</div>
<div style={{color:C.dim,fontSize:12,marginBottom:14,lineHeight:1.8}}>Inviata al manager · In attesa di verifica</div>
<div style={{…S.card(””),fontSize:11,color:C.dim,…mono,lineHeight:2,textAlign:“left”}}>
Sede: {loc?.sede||”—”}{”\n”}Ora: {loc?.ora||”—”}{”\n”}Foto allegate: {foto.length}
</div>
<button style={{…S.btnP,marginTop:14}} onClick={()=>{setFase(“idle”);setFoto([]);setOrdineId(””);}}>NUOVA SCANSIONE</button>
</div>
);
return (
<div style={S.page}>
<div style={S.title}>SCANSIONE BOLLA</div>
{loc&&<div style={{…S.card(“success”),marginBottom:9,fontSize:12,color:C.green}}>📍 Sede rilevata: <strong>{loc.sede}</strong> · {loc.ora}</div>}
<div style={{…S.card(””),textAlign:“center”,minHeight:140,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,marginBottom:9}}>
{foto.length===0
?(<><div style={{color:C.dim,marginBottom:7}}><Icon.Scan/></div><div style={{color:C.dim,fontSize:13}}>Nessuna foto caricata</div><div style={{fontSize:11,color:C.dim,marginTop:4}}>Max 3 pagine per bolla</div></>)
:(<><div style={{display:“flex”,gap:7,flexWrap:“wrap”,justifyContent:“center”,marginBottom:7}}>
{foto.map((f,i)=><img key={i} src={f} style={{width:70,height:90,objectFit:“cover”,borderRadius:6,border:`1px solid ${C.green}`}}/>)}
</div><div style={{fontSize:11,color:C.green,...mono}}>{foto.length} pagina/e caricata/e</div></>)
}
</div>
<input ref={fileRef} type=“file” accept=“image/*” multiple style={{display:“none”}} onChange={handleFile}/>
<div style={{display:“flex”,gap:7,marginBottom:foto.length?9:0}}>
<button style={{…S.btn(C.cyan,false),flex:1,display:“flex”,alignItems:“center”,justifyContent:“center”,gap:6}} onClick={()=>fileRef.current?.click()}><Icon.Cam/> Scatta / Carica</button>
<button style={{…S.btn(C.dim,false),flex:1}} onClick={()=>{fileRef.current.value=””;setFoto([]);}}>Cancella</button>
</div>
{foto.length>0&&(
<>
{foto.length<3&&<button style={{…S.btn(C.dim,true),marginBottom:9}} onClick={()=>fileRef.current?.click()}>+ Aggiungi pagina ({foto.length}/3)</button>}
<div style={S.card(“glow”)}>
<div style={{...mono,fontSize:9,color:C.cyan,letterSpacing:2,marginBottom:9}}>ASSOCIA A ORDINE</div>
<select style={{…S.inp,marginBottom:9}} value={ordineId} onChange={e=>setOrdineId(e.target.value)}>
<option value="">Seleziona ordine…</option>
{ordini.filter(o=>o.stato!==“Consegnato”).map(o=><option key={o.id} value={o.id}>{o.fornitore} — {o.sede}</option>)}
</select>
<div style={{background:“rgba(50,215,75,.04)”,border:“1px solid rgba(50,215,75,.1)”,borderRadius:8,padding:“8px 11px”,fontSize:11,color:C.dim,…mono,marginBottom:9,lineHeight:1.8}}>
📍 {loc?.sede||“rilevamento…”} · ⏰ {loc?.ora||”—”} · 📅 {new Date().toLocaleDateString(“it”)}
</div>
<button style={{…S.btnP,background:“rgba(50,215,75,.09)”,borderColor:C.green,color:C.green}} onClick={invia}>✓ CERTIFICA CONSEGNA</button>
</div>
</>
)}
</div>
);
}

function DipendenteControlli({yv}) {

if(countdown>0){const t=setTimeout(()=>setCountdown(c=>c-1),1000);return()=>clearTimeout(t);}
if(countdown===0&&pinState===“unlocked”){setPinState(“locked”);setPin(””);}
},[countdown,pinState]);

if(pin===“1234”){setPinState(“unlocked”);setCountdown(240);setErrPin(””);}
else{setErrPin(“PIN non valido — chiedi a Yannick”);setPin(””);}

);
